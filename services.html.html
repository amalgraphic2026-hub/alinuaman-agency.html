<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خدماتنا</title>
    <style>
        body {
            background-color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-top: 150px; 
            box-sizing: border-box;
        }

        h1 {
            color: #001f3f;
            margin-bottom: 40px;
            font-size: 6rem; 
            font-weight: 900;
            text-align: center;
            width: 100%;
        }

        .services-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 90%;
            max-width: 500px;
            margin-bottom: 40px;
        }

        .service-item {
            background-color: #f8f9fa;
            border: 2px solid #001f3f;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            color: #001f3f;
            font-weight: bold;
            font-size: 1.5rem;
            transition: transform 0.3s ease;
            cursor: pointer;
        }

        .service-item:hover { transform: scale(1.02); }

        /* حاوية الأرقام لتكون بجانب بعضها */
        .contact-wrapper {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 80px;
        }

        /* زر الرقم الموحد */
        .inquiry-btn {
            background-color: #001f3f;
            color: #ffffff;
            text-decoration: none;
            padding: 15px 25px;
            border-radius: 10px;
            font-weight: bold;
            font-size: 1.2rem; /* تم تصغير الخط قليلاً ليتناسب مع وجود رقمين */
            cursor: pointer;
            border: none;
            transition: 0.3s;
        }

        .inquiry-btn:hover { background-color: #ff8c00; transform: translateY(-2px); }

        /* نافذة الاختيار (Modal) */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-box {
            background: white;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            width: 85%;
            max-width: 350px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .modal-box h3 { color: #001f3f; margin-bottom: 20px; font-size: 1.5rem; }

        .modal-options {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .opt-btn {
            padding: 14px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.3s;
        }

        .opt-call { background: #001f3f; color: white; }
        .opt-whatsapp { background: #25D366; color: white; }
        .close-modal { margin-top: 15px; color: #999; cursor: pointer; display: block; font-weight: bold; }
    </style>
</head>
<body>

    <h1>خدماتنا</h1>

    <div class="services-list">
        <div class="service-item">حجز طيران</div>
        <div class="service-item">حجز باص</div>
        <div class="service-item">حجز باص خاص</div>
        <div class="service-item">موافقات أمنية إلى مصر</div>
        <div class="service-item">موافقات أمنية إلى الأردن</div>
        <div class="service-item">تأشيرات مرور مسقط عمان</div>
        <div class="service-item">معاملات تصميم</div>
        <div class="service-item">إستخراج قبول الصين</div>
        <div class="service-item">فيز عمل</div>
        <div class="service-item">تأشيرات الزيارة</div>
    </div>

    <div class="contact-wrapper">
        <button class="inquiry-btn" onclick="showContactOptions('967770784040', '770784040')">
            للاستفسار 770784040
        </button>
        
        <button class="inquiry-btn" onclick="showContactOptions('967770575959', '770575959')">
            للاستفسار 770575959
        </button>
    </div>

    <div id="contactModal" class="modal-overlay" onclick="closeModal()">
        <div class="modal-box" onclick="event.stopPropagation()">
            <h3 id="modalTitle">تواصل معنا</h3>
            <div class="modal-options">
                <a id="callLink" href="#" class="opt-btn opt-call">
                    📞 اتصال هاتفي
                </a>
                <a id="waLink" href="#" class="opt-btn opt-whatsapp">
                    💬 مراسلة واتساب
                </a>
            </div>
            <span class="close-modal" onclick="closeModal()">إلغاء</span>
        </div>
    </div>

    <script>
        function showContactOptions(fullNumber, displayNumber) {
            document.getElementById('modalTitle').innerText = "تواصل عبر الرقم: " + displayNumber;
            document.getElementById('callLink').href = "tel:+" + fullNumber;
            document.getElementById('waLink').href = "https://wa.me/" + fullNumber;
            document.getElementById('contactModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('contactModal').style.display = 'none';
        }
    </script>

</body>
</html><script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script><script src="/assets/js/script.min.js?h=35a745003519d0480832903c736bc4ec"></script></body></html>
