<!DOCTYPE html><html data-bs-theme="light" lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no"><title>المشروع امنية الغزالي (Backup 1771094406098)</title><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"><link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.12.0/css/all.css"><link rel="stylesheet" href="/assets/css/styles.min.css?h=0a537a44f222162ec09bab574d8f3f1a"></head><body><!-- Start: Navbar With Button --><nav class="navbar navbar-expand-md fixed-top bg-body py-3"><div class="container"><a class="navbar-brand d-flex align-items-center" href="#"></a><button data-bs-toggle="collapse" class="navbar-toggler" data-bs-target="#navcol-1"><span class="visually-hidden">Toggle navigation</span><span class="navbar-toggler-icon"></span></button><div class="collapse navbar-collapse" id="navcol-1" style="text-align: left;color: rgb(41,35,33);font-weight: bold;font-style: italic;"><ul class="navbar-nav me-auto"><li class="nav-item"></li><li class="nav-item"></li><li class="nav-item"></li></ul><ul class="navbar-nav"><li class="nav-item"></li><li class="nav-item"></li><li class="nav-item"></li><li class="nav-item"></li><li class="nav-item"><a class="nav-link" href="/تواصل%20معنا.html" style="color: var(--bs-orange);">تواصل معنا</a></li><li class="nav-item"><a class="nav-link" href="/خدماتنا.html" style="color: var(--bs-orange);">خدماتنا</a></li><li class="nav-item"><a class="nav-link" href="/من%20نحن.html" style="color: var(--bs-orange);">&nbsp;من نحن</a></li><li class="nav-item"><a class="nav-link" href="/الرئيسية.html" style="color: var(--bs-orange);">الصفحة الرئيسية</a></li></ul></div></div></nav><!-- End: Navbar With Button --><div class="booking-wrapper" style="background-color: #ffffff; min-height: 100vh; padding-top: 130px; padding-bottom: 100px; direction: rtl; font-family: 'Segoe UI', Tahoma, sans-serif;">
    <div class="container">
        <h2 class="text-center mb-5" style="color: #001f3f; font-weight: bold; font-size: 28px;">تفاصيل رحلة السيارة الخاصة</h2>

        <div class="row justify-content-center g-4">
            
            <div class="col-md-12 text-center mb-4">
                <div class="trip-type-wrapper">
                    <div class="trip-box" id="trip-round" onclick="toggleTrip('round', 'ذهاب وعودة')">
                        <span class="indicator"></span> ذهاب وعودة
                    </div>
                    <div class="trip-box" id="trip-one" onclick="toggleTrip('one', 'ذهاب فقط')">
                        <span class="indicator"></span> ذهاب فقط
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="luxury-card">
                    <label class="luxury-label">تحديد الوجهة</label>
                    <div class="input-container">
                        <input type="text" id="fromCity" placeholder="من مدينة..." class="luxury-input">
                        <div class="navy-divider"></div>
                        <input type="text" id="toCity" placeholder="إلى مدينة..." class="luxury-input">
                    </div>
                </div>
            </div>

            <div class="col-md-3">
                <div class="luxury-card">
                    <label class="luxury-label">نوع السيارة</label>
                    <div class="input-container">
                        <select id="carType" class="luxury-input">
                            <option value="" disabled selected>اختر الحجم</option>
                            <option value="سيارة صغيرة">سيارة صغيرة</option>
                            <option value="سيارة متوسطة">سيارة متوسطة</option>
                            <option value="حافلة كبيرة">حافلة كبيرة</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="luxury-card">
                    <label class="luxury-label">موعد السفر</label>
                    <div class="input-container">
                        <div class="date-box-wrapper" onclick="openPicker('depDate')">
                           <span id="depLabel" class="date-placeholder">تاريخ الذهاب</span>
                           <input type="date" id="depDate" class="hidden-date-input" onchange="updateLabel(this, 'depLabel')">
                        </div>
                        <div class="navy-divider" id="date-divider"></div>
                        <div class="date-box-wrapper" id="retDateWrapper" onclick="openPicker('retDate')">
                           <span id="retLabel" class="date-placeholder">تاريخ العودة</span>
                           <input type="date" id="retDate" class="hidden-date-input" onchange="updateLabel(this, 'retLabel')">
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-md-10 text-center mt-5">
                <label style="color: #001f3f; font-weight: bold; font-size: 20px; display: block; margin-bottom: 25px;">عدد الركاب</label>
                <div class="seats-flex" id="seats-container">
                    <div class="seat-option" id="seat-1" onclick="toggleSeat('1', 'فرد واحد')">
                        <div class="circle-box"><i class="fas fa-user"></i></div>
                        <span class="seat-label">فرد واحد</span>
                    </div>
                    <div class="seat-option" id="seat-2" onclick="toggleSeat('2', 'فردين')">
                        <div class="circle-box"><i class="fas fa-user-friends"></i></div>
                        <span class="seat-label">فردين</span>
                    </div>
                    <div class="seat-option" id="seat-3" onclick="toggleSeat('3', 'مجموعة')">
                        <div class="circle-box"><i class="fas fa-users"></i></div>
                        <span class="seat-label">مجموعة</span>
                    </div>
                </div>
            </div>

            <div class="col-md-12 text-center mt-5">
                <p id="error-msg" style="color: #d9534f; font-weight: bold; display: none; margin-bottom: 15px;">⚠️ يرجى إكمال جميع الحقول</p>
                <button onclick="saveAndNext()" class="final-submit-btn">متابعة الحجز</button>
            </div>
        </div>
    </div>
</div>

<style>
    .luxury-card { background-color: #001f3f !important; padding: 25px 15px; border-radius: 20px; transition: 0.3s; }
    .luxury-label { color: #ff8c00; font-weight: bold; font-size: 16px; display: block; margin-bottom: 12px; text-align: center; }
    .input-container { background: white; border-radius: 10px; display: flex; align-items: center; padding: 5px; height: 50px; }
    .navy-divider { width: 2px; background-color: #001f3f; height: 50%; margin: 0 5px; }
    .luxury-input { width: 100%; border: none; background: transparent; color: #001f3f; font-weight: bold; text-align: center; outline: none; font-size: 13px; }
    
    .trip-type-wrapper { display: flex; justify-content: center; gap: 15px; }
    .trip-box { background: #001f3f; color: white; padding: 10px 25px; border-radius: 10px; cursor: pointer; display: flex; align-items: center; gap: 8px; font-weight: bold; font-size: 14px; transition: 0.3s; border: 2px solid transparent; }
    .indicator { width: 12px; height: 12px; border: 2px solid white; border-radius: 50%; transition: 0.3s; }

    /* الحالة النشطة لنوع الرحلة */
    .trip-box.active-item { border-color: #ff8c00; }
    .trip-box.active-item .indicator { background-color: #ff8c00; border-color: #ff8c00; }

    .seats-flex { display: flex; justify-content: center; gap: 40px; }
    .seat-option { cursor: pointer; text-align: center; transition: 0.3s; }
    .circle-box { width: 70px; height: 70px; background: #001f3f; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; margin-bottom: 8px; transition: 0.3s; border: 3px solid transparent; }
    .circle-box i { color: white !important; }

    /* الحالة النشطة للمقاعد */
    .active-seat .circle-box { background-color: #ff8c00 !important; border-color: white; transform: scale(1.1); }
    .active-seat .seat-label { color: #ff8c00; font-weight: bold; }

    .date-box-wrapper { width: 100%; text-align: center; cursor: pointer; position: relative; transition: 0.3s; }
    .date-placeholder { color: #999; font-size: 13px; pointer-events: none; }
    .hidden-date-input { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; }
    
    .final-submit-btn { background-color: #ff8c00 !important; color: white !important; padding: 12px 60px; border-radius: 50px; font-weight: bold; cursor: pointer; border: none; font-size: 18px; transition: 0.3s; }
    .final-submit-btn:hover { transform: scale(1.05); }
</style>

<script>
    let currentTrip = "";
    let currentSeat = "";

    function openPicker(id) { 
        const el = document.getElementById(id);
        if (!el.disabled) el.showPicker(); 
    }
    
    function updateLabel(input, labelId) {
        if (input.value) {
            const lbl = document.getElementById(labelId);
            lbl.innerText = input.value; 
            lbl.style.color = "#001f3f"; 
            lbl.style.fontWeight = "bold";
        }
    }

    function toggleTrip(id, val) {
        const allTrips = document.querySelectorAll('.trip-box');
        const target = document.getElementById('trip-' + id);
        const retWrapper = document.getElementById('retDateWrapper');
        const divider = document.getElementById('date-divider');
        const retInput = document.getElementById('retDate');

        if (target.classList.contains('active-item')) {
            currentTrip = "";
            allTrips.forEach(box => { box.classList.remove('active-item'); box.style.display = "flex"; });
            resetReturnField(retWrapper, divider, retInput);
        } else {
            currentTrip = val;
            allTrips.forEach(box => {
                box.classList.remove('active-item');
                box.style.display = (box.id === 'trip-' + id) ? "flex" : "none";
            });
            target.classList.add('active-item');

            if (id === 'one') {
                retWrapper.style.display = "none";
                divider.style.display = "none";
                retInput.value = "";
                retInput.disabled = true;
            } else {
                resetReturnField(retWrapper, divider, retInput);
            }
        }
    }

    function resetReturnField(wrapper, divider, input) {
        wrapper.style.display = "block";
        divider.style.display = "block";
        input.disabled = false;
    }

    function toggleSeat(id, val) {
        const allSeats = document.querySelectorAll('.seat-option');
        const target = document.getElementById('seat-' + id);

        if (target.classList.contains('active-seat')) {
            currentSeat = "";
            allSeats.forEach(seat => { seat.classList.remove('active-seat'); seat.style.display = "block"; });
        } else {
            currentSeat = val;
            allSeats.forEach(seat => {
                seat.classList.remove('active-seat');
                seat.style.display = (seat.id === 'seat-' + id) ? "block" : "none";
            });
            target.classList.add('active-seat');
        }
    }

    function saveAndNext() {
        const from = document.getElementById('fromCity').value;
        const to = document.getElementById('toCity').value;
        const car = document.getElementById('carType').value;
        const depDate = document.getElementById('depDate').value;
        const retDate = document.getElementById('retDate').value;

        // التحقق الذكي: إذا ذهاب فقط لا يشترط تاريخ العودة
        const isDateOk = (currentTrip === 'ذهاب فقط') ? (depDate !== "") : (depDate !== "" && retDate !== "");

        if (!from || !to || !car || !isDateOk || !currentTrip || !currentSeat) {
            document.getElementById('error-msg').style.display = "block";
            document.getElementById('error-msg').scrollIntoView({ behavior: 'smooth' });
            return;
        }

        localStorage.clear(); 
        localStorage.setItem("category", "private_bus"); 
        localStorage.setItem("p_from", from);
        localStorage.setItem("p_to", to);
        localStorage.setItem("p_car_type", car);
        localStorage.setItem("p_date", depDate);
        localStorage.setItem("p_ret_date", (currentTrip === 'ذهاب فقط' ? "لا يوجد" : retDate));
        localStorage.setItem("p_trip_style", currentTrip);
        localStorage.setItem("p_passengers", currentSeat);

        window.location.href = "/متابعة%20الحجز.html";
    }
</script><script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script><script src="/assets/js/script.min.js?h=35a745003519d0480832903c736bc4ec"></script></body></html>
