    <h2 class="text-center mb-5" style="color: #001f3f; font-weight: bold; font-size: 32px;">البحث عن رحلات السفر والنقل</h2>
    
    <div class="row g-5 justify-content-center align-items-center">
        
        <div class="col-md-4 col-lg-3">
            <div class="custom-card">
                <div class="icon-circle" onclick="toggleTripSelection(this)">
                    <i class="fas fa-shuttle-van fa-4x text-white"></i>
                </div>
                <a href="/تفاصيل%20رحلة%20الباص%20الخاص.html" class="action-btn" onclick="checkAccess(event, this)">تفاصيل رحلة الباص الخاص</a>
            </div>
        </div>

        <div class="col-md-4 col-lg-3">
            <div class="custom-card">
                <div class="icon-circle" onclick="toggleTripSelection(this)">
                    <i class="fas fa-bus fa-4x text-white"></i>
                </div>
                <a href="/تفاصيل%20رحلة%20الباص.html" class="action-btn" onclick="checkAccess(event, this)">تفاصيل رحلة الباص</a>
            </div>
        </div>

        <div class="col-md-4 col-lg-3">
            <div class="custom-card">
                <div class="icon-circle" onclick="toggleTripSelection(this)">
                    <i class="fas fa-plane fa-4x text-white"></i>
                </div>
                <a href="/تفاصيل%20رحلة%20الطيران.html" class="action-btn" onclick="checkAccess(event, this)">تفاصيل رحلة الطيران</a>
            </div>
        </div>

    </div>
</div>

<style>
    .custom-card {
        background-color: #001f3f !important;
        border-radius: 25px;
        padding: 50px 20px;
        text-align: center;
        box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        min-height: 420px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        cursor: default;
    }

    /* حركة الارتفاع للمربعات غير المعطلة */
    .custom-card:hover:not(.disabled-card) {
        transform: translateY(-15px) scale(1.02);
        box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }

    .icon-circle {
        width: 140px;
        height: 140px;
        border: 4px solid #ff8c00;
        border-radius: 50%;
        margin: 0 auto 30px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: all 0.3s ease;
    }

    .icon-circle:hover {
        background-color: rgba(255, 140, 0, 0.1);
    }

    /* اللون البرتقالي الثابت */
    .active-orange-fill {
        background-color: #ff8c00 !important;
        box-shadow: 0 0 20px #ff8c00;
    }

    /* حالة التعتيم عند اختيار شيء آخر */
    .disabled-card {
        opacity: 0.3;
        pointer-events: none; 
        filter: grayscale(1);
        transform: scale(0.95);
    }

    .action-btn {
        background-color: #ff8c00 !important;
        color: white !important;
        text-decoration: none !important;
        display: block;
        padding: 15px 10px;
        border-radius: 12px;
        font-weight: bold;
        font-size: 18px;
        margin-top: 10px;
        transition: 0.3s;
    }

    .action-btn:hover {
        background-color: #e67e00 !important;
    }
</style>

<script>
    function toggleTripSelection(element) {
        const isAlreadyActive = element.classList.contains('active-orange-fill');
        const allCards = document.querySelectorAll('.custom-card');
        const allCircles = document.querySelectorAll('.icon-circle');

        if (isAlreadyActive) {
            // إذا ضغطتِ مرة ثانية على البرتقالي: احذفي اللون وافتحي كل الكروت
            element.classList.remove('active-orange-fill');
            allCards.forEach(card => card.classList.remove('disabled-card'));
        } else {
            // إذا ضغطتِ على دائرة جديدة: فعليها وقفلي البقية
            allCircles.forEach(circle => circle.classList.remove('active-orange-fill'));
            element.classList.add('active-orange-fill');

            const parentCard = element.closest('.custom-card');
            allCards.forEach(card => {
                if (card !== parentCard) {
                    card.classList.add('disabled-card');
                } else {
                    card.classList.remove('disabled-card');
                }
            });
        }
    }

    function checkAccess(event, element) {
        const parentCard = element.closest('.custom-card');
        // منع الانتقال إذا كان الكرت معطلاً
        if (parentCard.classList.contains('disabled-card')) {
            event.preventDefault();
            return false;
        }
        
        // التحقق إذا كان المستخدم لم يضغط على الدائرة بعد
        const circle = parentCard.querySelector('.icon-circle');
        if (!circle.classList.contains('active-orange-fill')) {
            event.preventDefault();
            alert("يرجى الضغط على الدائرة أولاً لتأكيد اختيار الرحلة");
        }
    }
</script><script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script><script src="/assets/js/script.min.js?h=35a745003519d0480832903c736bc4ec"></script></body></html>
